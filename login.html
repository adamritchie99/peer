<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Peer Auto - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,800;0,900;1,800;1,900&display=swap" rel="stylesheet">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      flex-direction: column;
    }
    main { flex: 1; display: flex; align-items: center; justify-content: center; }
    /* Top bar */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 1.5rem;
      background: rgba(15,15,15,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #222;
      transition: all 0.3s ease;
    }
    .top-bar.scrolled {
      padding: 0.6rem 1.5rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    .logo a {
      background: #ED1C24;
      color: white;
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-style: italic;
      font-size: clamp(1.3rem, 4vw, 1.9rem);
      padding: 0.45rem 1rem;
      border-radius: 8px;
      text-decoration: none;
      letter-spacing: -0.04em;
      box-shadow: 0 3px 10px rgba(0,0,0,0.4);
      transition: transform 0.2s ease;
    }
    .logo a:hover { transform: scale(1.05); }
    .nav-pill {
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 50px;
      padding: 0.4rem;
      display: flex;
      gap: 0.5rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    .nav-pill a {
      color: #ddd;
      text-decoration: none;
      font-weight: 600;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      transition: all 0.2s ease;
      font-size: clamp(0.95rem, 2.5vw, 1.05rem);
    }
    .nav-pill a:hover, .nav-pill a:focus {
      background: #ED1C24;
      color: white;
      transform: translateY(-1px);
    }
    .login-section {
      width: 100%;
      max-width: 400px;
      background: #111;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      margin: 0 0 1.5rem 0;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    label {
      display: flex;
      flex-direction: column;
      font-size: 1rem;
      color: #ddd;
      text-align: left;
    }
    input {
      background: #111;
      border: 1px solid #333;
      color: white;
      padding: 0.8rem;
      border-radius: 8px;
      font-size: 1rem;
      margin-top: 0.4rem;
    }
    .password-wrapper {
      position: relative;
    }
    .password-wrapper input {
      padding-right: 2.5rem;
    }
    .eye-icon {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #aaa;
      font-size: 1.2rem;
    }
    .eye-icon:hover {
      color: #ED1C24;
    }
    button[type="submit"] {
      background: #ED1C24;
      color: white;
      border: none;
      padding: 1rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
    }
    button[type="submit"]:hover {
      background: #c4171f;
    }
    /* Spinner styles */
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    button.loading {
      padding-left: 3rem;
    }
    button.loading::before {
      content: '';
      position: absolute;
      left: 1rem;
      top: 50%;
      margin-top: -0.6rem;
      width: 1.2rem;
      height: 1.2rem;
      border: 2px solid white;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    button.success {
      background: #28a745;
    }
    button.success::before {
      content: '✓';
      position: absolute;
      left: 1rem;
      top: 50%;
      margin-top: -0.8rem;
      font-size: 1.4rem;
    }
    button.error {
      background: #dc3545;
    }
    #mfaSection {
      display: none;
      margin-top: 1rem;
    }
    #recaptcha-container {
      margin-top: 1rem;
    }
    a {
      color: #ED1C24;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.9rem;
      color: #aaa;
      opacity: 0.7;
      margin-top: auto;
    }
    @media (max-width: 700px) {
      .login-section { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="top-bar" id="topBar">
    <div class="logo">
      <a href="index.html">Peer Auto</a>
    </div>
    <div class="nav-pill">
      <a href="explore.html">Explore</a>
      <a href="sell.html">Sell</a>
      <a href="account.html">Account</a>
    </div>
  </div>
  <main>
    <div class="login-section">
      <h1>Login</h1>
      <form id="loginForm">
        <label>
          Email
          <input type="email" id="email" required autocomplete="off">
        </label>
        <label class="password-wrapper">
          Password
          <input type="password" id="password" required autocomplete="off">
          <span class="eye-icon" id="togglePassword">&#128065;</span>
        </label>
        <button type="submit">Login</button>
      </form>
      <div id="mfaSection">
        <label>
          Verification Code (sent to your phone)
          <input type="text" id="mfaCode" required maxlength="6">
        </label>
        <button id="verifyMfaBtn">Verify</button>
      </div>
      <div id="recaptcha-container"></div>
      <p style="margin-top: 1rem;">Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
  </main>
  <footer>
    Designed by humans on Earth — specifically Detroit, Michigan. (AI helped with the coffee.)
  </footer>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, multiFactor, PhoneAuthProvider, PhoneMultiFactorGenerator, RecaptchaVerifier, getMultiFactorResolver } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDFG5JTmR8Si1diywYlYPQIQOTTBZwzNK4",
      authDomain: "peer-marketplace-d3f43.firebaseapp.com",
      projectId: "peer-marketplace-d3f43",
      storageBucket: "peer-marketplace-d3f43.firebasestorage.app",
      messagingSenderId: "138891180312",
      appId: "1:138891180312:web:8ebaaa3dea688da21d066d",
      measurementId: "G-LG5XX2436Q"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    let resolver;
    let verificationId = '';
    let recaptchaVerifier;

    $(document).ready(function() {
      // Clear fields on load
      setTimeout(() => {
        $('#email').val('');
        $('#password').val('');
      }, 100);

      // Eye icon toggle
      $('#togglePassword').on('click', function() {
        const type = $('#password').attr('type') === 'password' ? 'text' : 'password';
        $('#password').attr('type', type);
        this.textContent = type === 'password' ? '👁' : '🙈';
      });

      // Init reCAPTCHA
      recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { size: 'invisible' });

      const loginForm = $('#loginForm');
      const loginBtn = loginForm.find('button[type="submit"]');
      const mfaSection = $('#mfaSection');
      const verifyMfaBtn = $('#verifyMfaBtn');

      loginForm.on('submit', async function(e) {
        e.preventDefault();
        const email = $('#email').val().trim();
        const password = $('#password').val();
        loginBtn.addClass('loading').text('Logging in...').prop('disabled', true);
        try {
          await signInWithEmailAndPassword(auth, email, password);
          loginBtn.removeClass('loading').addClass('success').text('Logged in');
          setTimeout(() => {
            window.location.href = 'index.html'; // Or account.html
          }, 1500);
        } catch (error) {
          console.error('Login error:', error);
          if (error.code === 'auth/multi-factor-auth-required') {
            resolver = getMultiFactorResolver(auth, error);
            if (resolver.hints.length > 0 && resolver.hints[0].factorId === PhoneMultiFactorGenerator.FACTOR_ID) {
              const phoneInfoOptions = {
                multiFactorHint: resolver.hints[0],
                session: resolver.session
              };
              const phoneAuthProvider = new PhoneAuthProvider(auth);
              try {
                verificationId = await phoneAuthProvider.verifyPhoneNumber(phoneInfoOptions, recaptchaVerifier);
                mfaSection.show();
                alert('Verification code sent to your enrolled phone.');
                loginBtn.removeClass('loading').text('Login').prop('disabled', false);
              } catch (sendError) {
                console.error('Error sending MFA code:', sendError);
                alert('Failed to send code: ' + sendError.message);
                loginBtn.removeClass('loading').addClass('error').text('Failed');
                setTimeout(() => {
                  loginBtn.removeClass('error').text('Login').prop('disabled', false);
                }, 3000);
              }
            } else {
              alert('Unsupported MFA factor.');
              loginBtn.removeClass('loading').addClass('error').text('Unsupported');
              setTimeout(() => {
                loginBtn.removeClass('error').text('Login').prop('disabled', false);
              }, 3000);
            }
          } else {
            let errorMsg = 'Failed: ' + error.code;
            if (error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
              errorMsg = 'Invalid email or password.';
            }
            loginBtn.removeClass('loading').addClass('error').text(errorMsg);
            setTimeout(() => {
              loginBtn.removeClass('error').text('Login').prop('disabled', false);
            }, 3000);
          }
        }
      });

      verifyMfaBtn.on('click', async function() {
        const code = $('#mfaCode').val().trim();
        if (!code || code.length !== 6) {
          alert('Enter the 6-digit code.');
          return;
        }
        verifyMfaBtn.addClass('loading').text('Verifying...').prop('disabled', true);
        try {
          const cred = PhoneAuthProvider.credential(verificationId, code);
          const multiFactorAssertion = PhoneMultiFactorGenerator.assertion(cred);
          const userCredential = await resolver.resolveSignIn(multiFactorAssertion);
          verifyMfaBtn.removeClass('loading').addClass('success').text('Verified');
          setTimeout(() => {
            window.location.href = 'index.html'; // Or account.html
          }, 1500);
        } catch (error) {
          console.error('MFA verification error:', error);
          alert('Verification failed: ' + error.message);
          verifyMfaBtn.removeClass('loading').addClass('error').text('Failed');
          setTimeout(() => {
            verifyMfaBtn.removeClass('error').text('Verify').prop('disabled', false);
          }, 3000);
        }
      });
    });
  </script>
</body>
</html>
